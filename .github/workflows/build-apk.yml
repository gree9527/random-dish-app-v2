name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build Vue
        run: npm run build

      - name: Add Capacitor Android
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set Android version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Setting versionName=$VERSION, versionCode=${{ github.run_number }}"
          sed -i "s/versionName \".*\"/versionName \"$VERSION\"/g" android/app/build.gradle
          sed -i "s/versionCode [0-9]*/versionCode ${{ github.run_number }}/g" android/app/build.gradle
          grep -E "versionName|versionCode" android/app/build.gradle

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
